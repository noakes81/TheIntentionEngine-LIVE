kind = "web"
previewPath = "/"
title = "Orgone Manifestation Studio"
version = "1.0.0"
id = "artifacts/manifestation-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22154

[services.development]
run = "pnpm --filter @workspace/manifestation-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/manifestation-app", "run", "build" ]
publicDir = "artifacts/manifestation-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22154"
BASE_PATH = "/"
