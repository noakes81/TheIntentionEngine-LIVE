<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <rect width="80" height="80" rx="12" fill="hsl(270,45%,12%)"/>
  <rect x="1" y="1" width="78" height="78" rx="11" stroke="hsl(270,75%,45%)" stroke-opacity="0.5" stroke-width="1"/>
  <!-- Outer ring -->
  <circle cx="40" cy="40" r="28" stroke="hsl(270,75%,58%)" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Inner ring -->
  <circle cx="40" cy="40" r="18" stroke="hsl(270,75%,58%)" stroke-opacity="0.4" stroke-width="1"/>
  <!-- Center dot -->
  <circle cx="40" cy="40" r="4" fill="hsl(270,75%,65%)" fill-opacity="0.9"/>
  <!-- Crosshairs -->
  <line x1="40" y1="10" x2="40" y2="22" stroke="hsl(270,75%,65%)" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="58" x2="40" y2="70" stroke="hsl(270,75%,65%)" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="40" x2="22" y2="40" stroke="hsl(270,75%,65%)" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="40" x2="70" y2="40" stroke="hsl(270,75%,65%)" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diagonal ticks -->
  <line x1="19" y1="19" x2="25" y2="25" stroke="hsl(270,75%,58%)" stroke-opacity="0.35" stroke-width="1" stroke-linecap="round"/>
  <line x1="61" y1="19" x2="55" y2="25" stroke="hsl(270,75%,58%)" stroke-opacity="0.35" stroke-width="1" stroke-linecap="round"/>
  <line x1="19" y1="61" x2="25" y2="55" stroke="hsl(270,75%,58%)" stroke-opacity="0.35" stroke-width="1" stroke-linecap="round"/>
  <line x1="61" y1="61" x2="55" y2="55" stroke="hsl(270,75%,58%)" stroke-opacity="0.35" stroke-width="1" stroke-linecap="round"/>
  <!-- Glow effect -->
  <circle cx="40" cy="40" r="4" fill="hsl(270,75%,65%)" fill-opacity="0.3" filter="url(#glow)"/>
  <defs>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
